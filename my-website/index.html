<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Seeflix HD Movie</title>
  <link rel="icon" href="https://via.placeholder.com/32x32.png?text=S" />

  <!-- Open Graph -->
  <meta property="og:site_name" content="Seeflix HD Movie">
  <meta property="og:title" content="Watch Movies & TV Shows on Seeflix HD Movie">
  <meta property="og:description" content="Stream trending movies, TV shows, and anime in HD.">
  <meta property="og:image" content="https://via.placeholder.com/1200x630.png?text=Seeflix+HD+Movie">
  <meta property="og:type" content="website">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root{--bg:#070707;--panel:#0b1220;--muted:#9ca3af;--accent:#e50914}
    body{margin:0;background:var(--bg);color:#fff;font-family:Inter,system-ui}
    .section-grid{display:grid;gap:14px;grid-template-columns:repeat(5,1fr)}
    @media(max-width:1100px){.section-grid{grid-template-columns:repeat(3,1fr)}}
    @media(max-width:640px){.section-grid{grid-template-columns:repeat(2,1fr)}}
    .card{border-radius:10px;overflow:hidden;cursor:pointer}
    .card img{width:100%;height:320px;object-fit:cover}
    #modal{position:fixed;inset:0;display:none;background:rgba(0,0,0,.9);z-index:80;align-items:center;justify-content:center}
    .modal-inner{width:95%;max-width:1200px;height:88vh;background:#000;border-radius:10px;display:flex}
    .player-iframe{width:100%;height:56vh;border:0}
    #btn-close,#btn-back{position:fixed;top:16px;padding:8px;border-radius:999px;background:rgba(0,0,0,.6);z-index:90}
    #btn-close{right:16px}#btn-back{left:16px}
  </style>
</head>

<body>

<header class="px-4 py-3 flex justify-between">
  <div class="flex gap-3 items-center">
    <img src="https://via.placeholder.com/40?text=S" class="h-10 rounded">
    <div class="text-2xl font-bold text-red-500">Seeflix HD Movie</div>
  </div>
</header>

<section class="max-w-7xl mx-auto px-4 py-6 space-y-8">
  <div>
    <h3 class="text-lg font-semibold mb-3">Trending Movies</h3>
    <div id="movies-list" class="section-grid"></div>
  </div>
</section>

<div class="ad-container my-4">
  <script src="https://fpyf8.com/88/tag.min.js" data-zone="178939" async></script>
</div>

<!-- Modal -->
<div id="modal">
  <div class="modal-inner">
    <div class="flex-1">
      <iframe id="player" class="player-iframe" allowfullscreen></iframe>
    </div>
    <div class="flex-1 p-4 overflow-auto">
      <h3 id="modal-title" class="text-xl font-semibold"></h3>
      <p id="modal-desc" class="text-sm text-gray-400 mt-2"></p>

      <button id="watchlist-btn" class="mt-3 px-3 py-1 border rounded">☆ Watchlist</button>

      <!-- Share -->
      <div class="mt-4">
        <div class="text-xs text-gray-400">Share</div>
        <div class="flex gap-2 mt-2 flex-wrap">
          <button id="share-facebook" class="px-3 py-1 rounded bg-blue-600">Facebook</button>
          <button id="share-twitter" class="px-3 py-1 rounded bg-sky-500">X</button>
          <button id="share-whatsapp" class="px-3 py-1 rounded bg-green-500 text-black">WhatsApp</button>
          <button id="share-telegram" class="px-3 py-1 rounded bg-cyan-500">Telegram</button>
          <button id="share-copy" class="px-3 py-1 rounded border">Copy</button>
        </div>
      </div>
    </div>
  </div>
</div>

<button id="btn-back">←</button>
<button id="btn-close">✕</button>

<script>
const API_KEY='169689830f09449f1d23896257d507db';
const BASE='https://api.themoviedb.org/3';
const IMG='https://image.tmdb.org/t/p/w500';
const el=id=>document.getElementById(id);
let current=null;
let favorites=new Set(JSON.parse(localStorage.getItem('seeflix_watchlist')||'[]'));

function safeImg(p){return p?IMG+p:'https://via.placeholder.com/300x450'}

async function fetchJSON(u){const r=await fetch(u);return r.json()}

function setMovieHash(item){
  const type=item.title?'movie':'tv';
  history.replaceState(null,'',`#${type}=${item.id}`);
}

function clearMovieHash(){
  history.replaceState(null,'',location.pathname);
}

function updateOG(item){
  document.querySelector('meta[property="og:title"]').content=item.title||item.name;
  document.querySelector('meta[property="og:description"]').content=item.overview||'Watch now';
  if(item.poster_path){
    document.querySelector('meta[property="og:image"]').content=IMG+item.poster_path;
  }
}

function setupShareButtons(){
  const url=encodeURIComponent(location.href);
  const title=current.title||current.name;
  const text=encodeURIComponent(`Watch "${title}" on Seeflix HD Movie`);

  el('share-facebook').onclick=()=>open(`https://facebook.com/sharer/sharer.php?u=${url}`);
  el('share-twitter').onclick=()=>open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`);
  el('share-whatsapp').onclick=()=>open(`https://api.whatsapp.com/send?text=${text}%20${url}`);
  el('share-telegram').onclick=()=>open(`https://t.me/share/url?url=${url}&text=${text}`);
  el('share-copy').onclick=()=>navigator.clipboard.writeText(location.href).then(()=>alert('Link copied'));
}

function openModalFor(item){
  current=item;
  el('modal-title').textContent=item.title||item.name;
  el('modal-desc').textContent=item.overview||'';
  el('player').src=`https://vidsrc.cc/v2/embed/movie/${item.id}`;
  el('modal').style.display='flex';
  document.body.style.overflow='hidden';
  setMovieHash(item);
  updateOG(item);
  setupShareButtons();
}

function closeModal(){
  el('modal').style.display='none';
  el('player').src='';
  document.body.style.overflow='';
  clearMovieHash();
}

async function openFromHash(){
  if(!location.hash) return;
  const [type,id]=location.hash.replace('#','').split('=');
  const data=await fetchJSON(`${BASE}/${type}/${id}?api_key=${API_KEY}`);
  data.media_type=type;
  openModalFor(data);
}

async function loadMovies(){
  const r=await fetchJSON(`${BASE}/trending/movie/week?api_key=${API_KEY}`);
  r.results.forEach(m=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`<img src="${safeImg(m.poster_path)}">`;
    d.onclick=()=>openModalFor(m);
    el('movies-list').appendChild(d);
  });
}

el('btn-close').onclick=closeModal;
el('btn-back').onclick=closeModal;

document.addEventListener('DOMContentLoaded',()=>{
  loadMovies();
  openFromHash();
});
</script>

</body>
</html>
