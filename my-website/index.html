<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>See-Flix | Watch Movies & TV</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* BASIC STYLING */
    body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; overflow-x: hidden; }
    .navbar { display: flex; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.9); position: fixed; width: 100%; z-index: 1000; box-sizing: border-box; }
    .navbar img { height: 35px; margin-right: 20px; }
    .nav-links a { color: white; text-decoration: none; margin-right: 15px; font-weight: bold; }
    .search-bar { padding: 8px; border-radius: 20px; border: 1px solid #444; background: #222; color: white; outline: none; }

    /* BANNER */
    .banner { 
        height: 70vh; 
        background-size: cover; 
        background-position: center; 
        display: flex; 
        align-items: flex-end; 
        padding: 5%;
        position: relative;
    }
    .banner::after { content: ''; position: absolute; left: 0; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, #000, transparent); }
    .banner-content { position: relative; z-index: 2; max-width: 600px; }
    .banner-content h1 { font-size: 3rem; margin-bottom: 10px; }

    /* MOVIE ROWS */
    .row { padding: 20px 0 0 5%; }
    .row h2 { font-size: 1.5rem; margin-bottom: 10px; color: #e5e5e5; }
    .list { 
        display: flex; 
        overflow-x: auto; 
        gap: 15px; 
        padding: 10px 0;
        scrollbar-width: none; 
    }
    .list::-webkit-scrollbar { display: none; }
    .list img { 
        width: 160px; 
        border-radius: 5px; 
        cursor: pointer; 
        transition: transform 0.3s ease; 
    }
    .list img:hover { transform: scale(1.1); z-index: 10; border: 2px solid white; }

    /* AD BUTTON */
    .ad-btn {
        display: inline-block;
        background: #ff4c4c;
        color: white;
        padding: 12px 25px;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
        margin: 15px 0;
        transition: 0.3s;
        border: none;
        cursor: pointer;
    }
    .ad-btn:hover { background: #ff0000; transform: translateY(-2px); }

    /* MODAL */
    .modal { 
        display: none; 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background: rgba(0,0,0,0.95); 
        z-index: 2000; 
        justify-content: center; 
        overflow-y: auto;
        padding-top: 50px;
    }
    .modal-content { width: 90%; max-width: 900px; color: white; padding-bottom: 50px; }
    .close { position: fixed; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; z-index: 2100; }
    
    .video-container { position: relative; width: 100%; padding-top: 56.25%; background: #111; margin-top: 20px; }
    #modal-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    /* Invisible layer over video to trigger ad link on first play */
    .video-ad-overlay {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: 10;
        cursor: pointer;
    }

    .server-selector { margin: 20px 0; background: #222; padding: 10px; border-radius: 5px; }
    select { padding: 5px; background: #444; color: white; border: none; }

    /* SEARCH MODAL */
    .search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 3000; flex-direction: column; align-items: center; padding-top: 100px; }
    #search-input { width: 70%; padding: 15px; font-size: 1.5rem; background: transparent; border: none; border-bottom: 2px solid white; color: white; outline: none; }
    #search-results { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; padding: 40px; }
  </style>
</head>

<body>

  <div class="navbar">
    <img src="https://via.placeholder.com/150x50?text=SEE-FLIX" alt="Logo" />
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Movies</a>
      <a href="#">TV Shows</a>
      <input type="text" class="search-bar" placeholder="Search..." onfocus="openSearchModal()" />
    </div>
  </div>

  <div class="banner" id="banner">
    <div class="banner-content">
        <h1 id="banner-title">Welcome</h1>
        <p id="banner-desc"></p>
        <!-- High Priority Ad Link -->
        <a href="https://www.profitablecpmratenetwork.com/w3f5muus?key=76b37a7d6c57add1c591a599dc7bc96f" target="_blank" class="ad-btn">
            <i class="fas fa-play"></i> Watch in HD Free
        </a>
    </div>
  </div>

  <div class="row">
    <h2>Trending Movies</h2>
    <div class="list" id="movies-list"></div>
  </div>

  <div class="row">
    <h2>Trending TV Shows</h2>
    <div class="list" id="tvshows-list"></div>
  </div>

  <div class="row">
    <h2>Trending Anime</h2>
    <div class="list" id="anime-list"></div>
  </div>

  <!-- Details Modal -->
  <div class="modal" id="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <div class="modal-content">
      <h2 id="modal-title" style="font-size: 2.5rem; margin-bottom: 10px;"></h2>
      <div id="modal-rating" style="color: gold; margin-bottom: 10px;"></div>
      <p id="modal-description" style="line-height: 1.6; color: #ccc; max-width: 800px;"></p>
      
      <!-- Ad Link Button inside Modal -->
      <a href="https://www.profitablecpmratenetwork.com/w3f5muus?key=76b37a7d6c57add1c591a599dc7bc96f" target="_blank" class="ad-btn">
         <i class="fas fa-download"></i> High Speed Stream (Server 1)
      </a>

      <div class="server-selector">
        <label>Select Server: </label>
        <select id="server" onchange="changeServer()">
          <option value="vidsrc.cc">Vidsrc.cc (Fast)</option>
          <option value="vidsrc.me">Vidsrc.me</option>
          <option value="player.videasy.net">Videasy</option>
        </select>
      </div>

      <div class="video-container">
        <!-- Invisible layer to capture click for ad link -->
        <div class="video-ad-overlay" id="video-overlay" onclick="handleVideoClick()"></div>
        <iframe id="modal-video" frameborder="0" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <!-- Search Modal -->
  <div class="search-modal" id="search-modal">
    <span class="close" onclick="closeSearchModal()">&times;</span>
    <input type="text" id="search-input" placeholder="Type movie or tv show name..." oninput="searchTMDB()" />
    <div id="search-results"></div>
  </div>

  <script>
    const API_KEY = 'a1e72fd93ed59f56e6332813b9f8dcae';
    const AD_LINK = 'https://www.profitablecpmratenetwork.com/w3f5muus?key=76b37a7d6c57add1c591a599dc7bc96f';
    const BASE_URL = 'https://api.themoviedb.org/3';
    const IMG_URL = 'https://image.tmdb.org/t/p/w500';
    let currentItem;

    // --- AD LOGIC ---
    // 1. Pop-under: Opens ad on first click anywhere on the page
    document.addEventListener('click', function() {
        if (!window.popDone) {
            window.open(AD_LINK, '_blank');
            window.popDone = true;
        }
    });

    // 2. Video Overlay Logic: User clicks "Play", ad opens, overlay disappears
    function handleVideoClick() {
        window.open(AD_LINK, '_blank');
        document.getElementById('video-overlay').style.display = 'none';
    }

    // --- MOVIE DATA LOGIC ---
    async function fetchTrending(type) {
      const res = await fetch(`${BASE_URL}/trending/${type}/week?api_key=${API_KEY}`);
      const data = await res.json();
      return data.results.map(item => ({...item, media_type: type}));
    }

    async function fetchTrendingAnime() {
      const res = await fetch(`${BASE_URL}/discover/tv?api_key=${API_KEY}&with_original_language=ja&with_genres=16`);
      const data = await res.json();
      return data.results.map(item => ({...item, media_type: 'tv'}));
    }

    function displayBanner(item) {
      document.getElementById('banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;
      document.getElementById('banner-title').textContent = item.title || item.name;
      document.getElementById('banner-desc').textContent = item.overview.substring(0, 150) + '...';
    }

    function displayList(items, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      items.forEach(item => {
        if (!item.poster_path) return;
        const img = document.createElement('img');
        img.src = `${IMG_URL}${item.poster_path}`;
        img.onclick = () => showDetails(item);
        container.appendChild(img);
      });
    }

    function showDetails(item) {
      currentItem = item;
      document.getElementById('modal-title').textContent = item.title || item.name;
      document.getElementById('modal-description').textContent = item.overview;
      document.getElementById('modal-rating').innerHTML = 'Rating: ★ ' + item.vote_average.toFixed(1);
      
      // Reset video overlay so ad shows again for new movie
      document.getElementById('video-overlay').style.display = 'block';
      
      document.getElementById('modal').style.display = 'flex';
      changeServer();
    }

    function changeServer() {
      if (!currentItem) return;
      const server = document.getElementById('server').value;
      const type = currentItem.media_type === "movie" ? "movie" : "tv";
      let embedURL = "";

      if (server === "vidsrc.cc") {
        embedURL = `https://vidsrc.cc/v2/embed/${type}/${currentItem.id}`;
      } else if (server === "vidsrc.me") {
        embedURL = `https://vidsrc.net/embed/${type}/?tmdb=${currentItem.id}`;
      } else if (server === "player.videasy.net") {
        embedURL = `https://player.videasy.net/${type}/${currentItem.id}`;
      }

      document.getElementById('modal-video').src = embedURL;
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      document.getElementById('modal-video').src = '';
    }

    function openSearchModal() {
      document.getElementById('search-modal').style.display = 'flex';
      document.getElementById('search-input').focus();
    }

    function closeSearchModal() {
      document.getElementById('search-modal').style.display = 'none';
    }

    async function searchTMDB() {
      const query = document.getElementById('search-input').value;
      if (query.length < 2) return;

      const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${query}`);
      const data = await res.json();

      const container = document.getElementById('search-results');
      container.innerHTML = '';
      data.results.forEach(item => {
        if (!item.poster_path) return;
        const img = document.createElement('img');
        img.src = `${IMG_URL}${item.poster_path}`;
        img.style.width = "150px";
        img.onclick = () => {
          closeSearchModal();
          showDetails(item);
        };
        container.appendChild(img);
      });
    }

    async function init() {
      const movies = await fetchTrending('movie');
      const tvShows = await fetchTrending('tv');
      const anime = await fetchTrendingAnime();

      if(movies.length > 0) displayBanner(movies[0]);
      displayList(movies, 'movies-list');
      displayList(tvShows, 'tvshows-list');
      displayList(anime, 'anime-list');
    }

    init();
  </script>
</body>
</html>
